# Training configuration for PhaseNet retraining
model:
  name: "PhaseNet"
  architecture:
    in_channels: 3  # Z, N, E components
    classes: 3  # P, S, Noise
    phases: "PS"
    sampling_rate: 100  # Hz
    
  pretrained:
    use_pretrained: true
    model_name: "stead"  # Options: stead, instance, ethz, pnw (if available)
    freeze_layers: []  # List of layer names to freeze, empty for full fine-tuning
    # Available pretrained models from our focused datasets:
    # - stead: Trained on STEAD dataset (Stanford Earthquake Dataset)
    # - instance: Trained on INSTANCE dataset
    # - ethz: Trained on ETHZ dataset
    # Note: PNW and TXED models may need to be trained from these datasets

training:
  batch_size: 128
  num_workers: 4
  max_epochs: 100
  learning_rate: 0.001
  optimizer: "adam"
  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6
  
  early_stopping:
    monitor: "val_loss"
    patience: 10
    mode: "min"
  
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  # Specify which SeisBench dataset to use
  # Options: STEAD, INSTANCE, ETHZ, PNW, TXED
  dataset_name: "STEAD"  # Primary dataset
  
  # If using local data instead of SeisBench datasets
  train_data: "data/train"
  val_data: "data/val"
  test_data: "data/test"
  
  # Dataset loading options
  use_seisbench_dataset: false  # Set to true to load directly from SeisBench
  download_dataset: false  # Set to true to download dataset if not present
  
  # Label error filtering
  # Removes documented bad picks from albertleonardo/labelerrors repository
  label_error_filtering:
    enabled: true  # Enable to filter out samples with known label errors
    filter_multiplets: true  # Remove samples with unlabeled earthquakes (multiplets)
    filter_noise: true  # Remove noise samples that contain unlabeled events
    cache_dir: null  # Custom cache directory for error reports (default: ~/.cache/phasenet_retrain/label_errors)
  
  # Data augmentation
  augmentation:
    use_augmentation: true
    noise_addition: true
    noise_level: 0.1
    time_shift: true
    max_shift_samples: 50
    amplitude_scaling: true
    scale_range: [0.8, 1.2]
  
  # Preprocessing
  preprocessing:
    normalize: true
    filter: true
    filter_type: "bandpass"
    freqmin: 1.0
    freqmax: 45.0
  
  # Window parameters
  window_length: 3001  # samples (30 seconds at 100 Hz)
  overlap: 0.5

logging:
  use_wandb: false
  wandb_project: "phasenet-retrain"
  wandb_entity: null
  
  use_tensorboard: true
  log_every_n_steps: 50
  
  save_dir: "results"
  checkpoint_dir: "checkpoints"

hardware:
  accelerator: "auto"  # auto, gpu, cpu, mps
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  
seed: 42
