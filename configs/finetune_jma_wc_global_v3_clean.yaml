# v3_clean: same recipe as v3, retrained on data/manifests_v2_clean (leak-free rebuild via issue #32-fixed build_training_dataset.py).
# Auto-generated by make_clean_config.py for the leak-free retrain comparison.

# Fine-tune jma_wc on v2 dataset with Knowledge Distillation
# Fix for v2's catastrophic forgetting:
#   - distillation.alpha=0.3 keeps student anchored to frozen pretrained teacher
#   - learning_rate 1e-5 → 5e-6 (smaller updates, stay closer to pretrained init)
# Everything else matches v2 (same diverse manifests, same architecture).

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 100
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    monitor: "val_loss"
    patience: 15
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2_clean/train.csv"
  val_manifest: "data/manifests_v2_clean/val.csv"
  test_manifest: "data/manifests_v2_clean/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v3_clean"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v3_clean"
  metrics_csv: "results/finetune_jma_wc_global_v3_clean_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  amp: true

seed: 42
