# v10_clean: same recipe as v10, retrained on data/manifests_v2_clean (leak-free rebuild via issue #32-fixed build_training_dataset.py).
# Auto-generated by make_clean_config.py for the leak-free retrain comparison.

# v10: Two-stage training — Stage 2 (P-recall recovery)
#
#  Stage 1 was v9: trained on S-balanced manifests_v3.
#  Result: S-recall 0.539 (best ever) but P-recall 0.830 and MCC 0.675 (too low).
#
#  Stage 2 (this run): start from v9 best.pt, retrain on full manifests_v2.
#  Goal: recover P-recall toward jma_wc (0.881) while keeping S-recall gains.
#
#  Key choices:
#   - init-from v9 best.pt via --init-from flag (fresh optimizer, model weights only)
#   - LR=1e-6 (5× lower than stage 1) — small nudge, don't overwrite S-learning
#   - alpha=0.4 (stronger KD anchor to jma_wc teacher than stage 1's 0.3)
#     The teacher has P-recall=0.881; pulling toward it should recover P precision.
#   - manifests_v2 (full 527k train, 38% S coverage) — reintroduces P diversity
#   - ReduceLROnPlateau on val_p_mae_s (same fix as v9)
#   - Early stop patience=7 on val_p_mae_s

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 40
  learning_rate: 0.000001
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.4
    temperature: 4.0

  timing_beta: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-8

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 7
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2_clean/train.csv"
  val_manifest: "data/manifests_v2_clean/val.csv"
  test_manifest: "data/manifests_v2_clean/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v10_clean"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v10_clean"
  metrics_csv: "results/finetune_jma_wc_global_v10_clean_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  amp: true

seed: 42
