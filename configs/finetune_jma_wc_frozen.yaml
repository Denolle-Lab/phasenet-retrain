# Fine-tune jma_wc with frozen early encoder layers to prevent catastrophic forgetting.
# Frozen: inc, in_bn, down_branch.0, down_branch.1, down_branch.2 (early feature extraction)
# Trainable: down_branch.3, down_branch.4, up_branch.*, out

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers:
      - "inc"
      - "in_bn"
      - "down_branch.0"
      - "down_branch.1"
      - "down_branch.2"

training:
  batch_size: 1024
  num_workers: 8
  max_epochs: 100
  learning_rate: 0.00003        # 3e-5: slightly higher since fewer params are trainable
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-7

  early_stopping:
    monitor: "val_loss"
    patience: 15
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests/train.csv"
  val_manifest:   "data/manifests/val.csv"
  test_manifest:  "data/manifests/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_frozen"
  checkpoint_dir: "checkpoints/finetune_jma_wc_frozen"
  metrics_csv: "results/finetune_jma_wc_frozen_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  amp: true

seed: 42
