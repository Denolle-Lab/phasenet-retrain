# v9: Two root-cause fixes over v3 (best stable baseline)
#
#  Fix 1 — S-pick starvation:
#    manifests_v2 had only 38% S-pick coverage.  manifests_v3 (built with
#    --s-balanced) requires a valid S pick for every use_s=True dataset, raising
#    coverage to ~90%+.  This directly targets the biggest benchmark gap:
#    S-recall 0.511 (v3) vs 0.549 (jma_wc).
#
#  Fix 2 — ReduceLROnPlateau on wrong metric:
#    v3/v7 stepped the scheduler on val_loss, which never plateaued (loss kept
#    falling even as val_p_mae_s worsened after epoch 4).  LR was stuck at 5e-6
#    for all 100 epochs.  Switching scheduler.monitor to val_p_mae_s forces LR
#    decay when timing accuracy stops improving — pulling the model back toward
#    epoch-4-quality picks.
#
#  Everything else matches v3 (proven stable): alpha=0.3, no class_weights,
#  no timing_beta, AdamW 5e-6.  Early stop patience tightened to 7 so we
#  don't waste GPU time past the optimal point.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 80
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  timing_beta: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"       # step on pick-timing metric, not val_loss
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-7

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 7
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v3/train.csv"
  val_manifest:   "data/manifests_v3/val.csv"
  test_manifest:  "data/manifests_v3/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v9"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v9"
  metrics_csv: "results/finetune_jma_wc_global_v9_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  amp: true

seed: 42
