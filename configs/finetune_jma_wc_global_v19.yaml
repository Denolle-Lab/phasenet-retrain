# v19: P-MAE focused — the only metric that matters
#
# Objective: minimise P-pick timing error (p_mae_s) on the benchmark.
# S-recall, detection rate, MCC are secondary concerns.
#
# ─── Lessons from v1–v17 (P-MAE lens only) ───────────────────────────────────
#
#  What clearly hurts P-MAE:
#   • Teleseismic training data (emergent onsets, noisy timing labels):
#       v16/v17 regional p_mae_s jumped from 0.359s → 0.54–0.56s
#       Even 1.5× tele caused measurable degradation. Remove entirely.
#   • Noise augmentation (even mild SNR 2–8 dB): +35–65% P-MAE penalty
#   • Timing loss (beta>0): paradoxically collapses recall + hurts MAE
#   • Presence loss (gamma>0): inflates p_outlier, degrades timing
#   • No distillation (alpha=0): P-MAE catastrophically collapses to 0.97+s
#   • High LR (1e-4): destroys pretrained features in first few epochs
#   • S-balanced data (manifests_v3): local p_mae_s 0.208→0.241 (v9 vs v7)
#
#  Best P-MAE achieved per distance (v7):
#   • Local:      0.208s   (vs jma_wc 0.227s  → 8.7% better)
#   • Regional:   0.359s   (vs jma_wc 0.395s  → 9.1% better)
#   • Teleseismic: 1.724s  (vs jma_wc 1.803s  → 4.4% better)
#   • Overall:    0.340s   (vs jma_wc 0.374s  → 9.1% better)
#
#  Why the overall P-MAE (0.340s) is worse than local alone (0.208s):
#   The ~164 teleseismic detections (P-MAE=1.72s each) dilute the average.
#   Without tele training → model stops detecting tele → those 1.72s errors
#   drop out of the metric entirely → lower overall P-MAE.
#
#  Key untried combination:
#   • v9 monitored val_p_mae_s (the RIGHT objective) but patience=7 → stopped
#     at epoch 13. With patience=30 it should converge fully.
#   • v7 used val_loss (indirect proxy) and still got best P-MAE. Direct
#     val_p_mae_s monitoring should be equal or better for this task.
#
# ─── v19 design ──────────────────────────────────────────────────────────────
#
#  1. LOCAL + REGIONAL ONLY training (no tele, no noise rows):
#     350k traces, 100% of gradient from precise impulsive P arrivals.
#     Tele emergent onsets no longer dilute the timing signal.
#
#  2. LOCAL + REGIONAL val set (val_p_focused.csv):
#     val_p_mae_s now reflects ONLY the timing quality we care about.
#     No tele picks inflating the monitored metric.
#
#  3. Monitor val_p_mae_s (direct target) with patience=30:
#     The best.pt is selected for lowest P-MAE, not lowest overall loss.
#     patience=30 >> v9's 7 — gives full convergence.
#
#  4. alpha=0.3, T=4.0 — the only proven timing-preserving formula.
#     Teacher (jma_wc) P-MAE=0.374s serves as the cross-domain anchor.
#
#  5. min_lr=1e-8 — allows 3–4 extra decay stages after plateau.
#     v7 stopped at min_lr=1e-6 (only 1 decay stage possible).
#
#  6. Everything else identical to v7 (the baseline that won on P-MAE).

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 250
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  timing_beta: 0.0
  presence_gamma: 0.0
  focal_gamma: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"
    mode: "min"
    factor: 0.5
    patience: 10
    min_lr: 1.0e-8

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 30
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train_p_focused.csv"
  val_manifest:   "data/manifests_v2/val_p_focused.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v19"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v19"
  metrics_csv: "results/finetune_jma_wc_global_v19_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
