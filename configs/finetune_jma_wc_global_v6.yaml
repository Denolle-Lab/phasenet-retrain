# v6: Return to v3's proven LR/KD regime, add small timing loss
#
#  v4/v5 post-mortem: 20x higher LR (1e-4 vs 5e-6) + weaker KD (alpha 0.1 vs 0.3)
#  caused the model to drift far from pretrained jma_wc weights, collapsing
#  cross-domain P-Recall from 0.87 (v3) to 0.30-0.41.
#
#  Changes vs v3:
#   - timing_beta: 0.01 (small timing loss; zero in v3)
#   - max_epochs: 150 (was 100; give timing loss room to help)
#   - early_stopping patience: 20 (was 15)
#  Everything else matches v3 exactly.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 150
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  timing_beta: 0.01

  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    monitor: "val_loss"
    patience: 20
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train.csv"
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v6"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v6"
  metrics_csv: "results/finetune_jma_wc_global_v6_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
