# Fine-tune jma_wc on expanded v2 dataset
# New vs global_v1: adds meier2019jgr (150k), ross2018gpd (200k), obs (100k);
# all existing caps doubled; teleseismic target fraction raised 0.20 -> 0.25.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 100
  learning_rate: 0.00001
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    monitor: "val_loss"
    patience: 15
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train.csv"
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v2"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v2"
  metrics_csv: "results/finetune_jma_wc_global_v2_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
