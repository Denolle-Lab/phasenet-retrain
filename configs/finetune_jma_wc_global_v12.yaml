# v12: No distillation — init from v7, pure CE task loss
#
#  The distillation teacher (jma_wc) has P-MAE=0.374s at the benchmark.
#  Training the student to match teacher outputs imposes a soft ceiling
#  on timing accuracy — the student cannot be meaningfully sharper than
#  what the teacher is already outputting at each sample.
#
#  Fix: drop the teacher entirely (alpha=0).  Start from v7's already-good
#  weights and let the model optimise only the CE task loss on Gaussian
#  labels.  A very low LR (1e-6) ensures we make small, targeted corrections
#  rather than washing out v7's timing-tuned representations.
#
#  Everything else matches v9/v11 (the proven stable scaffold):
#    manifests_v2, ReduceLROnPlateau on val_p_mae_s, patience=7,
#    gradient clip 1.0.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 50
  learning_rate: 0.000001      # 5× lower than v9/v11 — small nudge from v7 init
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.0                 # OFF — no teacher; removes the jma_wc timing ceiling
    temperature: 4.0

  timing_beta: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-8

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 7
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train.csv"
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v12"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v12"
  metrics_csv: "results/finetune_jma_wc_global_v12_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
