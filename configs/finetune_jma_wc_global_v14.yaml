# v14: Dial back noise augmentation to recover timing precision
#
#  v13 post-mortem:
#    noise_prob=0.40, SNR 0-10 dB achieved best-ever recall (0.888) and
#    MCC (0.943), but P-MAE collapsed to 0.967s (p_outlier=0.241).
#    The recall fixes (noise aug, pick-presence loss, 2x tele oversampling)
#    all work — the noise was simply too aggressive.  At SNR 0-5dB the
#    signal is buried; the model learns to fire on noise structure rather
#    than onset features, smearing timing.
#
#  Two changes vs v13:
#    1. noise_prob: 0.40 → 0.20  (half as many noisy examples)
#    2. noise_snr_db_range: [0,10] → [5,10]  (floor raised; no sub-5dB)
#
#  Everything else identical to v13 (pick-presence loss gamma=0.5,
#  2x tele manifest, alpha=0, LR=5e-6, init from v7).

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 60
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.0
    temperature: 4.0

  timing_beta: 0.0

  presence_gamma: 0.5

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-7

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 10
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train_tele2x.csv"   # 2x teleseismic
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

  augmentation:
    noise_prob: 0.20                  # halved from v13 (was 0.40)
    noise_snr_db_range: [5, 10]       # floor raised from 0→5 dB

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v14"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v14"
  metrics_csv: "results/finetune_jma_wc_global_v14_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
