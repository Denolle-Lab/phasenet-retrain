# v17: Best single-model design — v7 recipe + tele2x data + longer training
#
# Root-cause analysis of all prior versions:
#
#   v2:  LR too high (1e-5), no KD → catastrophic forgetting (P-MAE 1.25)
#   v3:  KD alpha=0.3, T=4.0, LR=5e-6 → first stable win (P-MAE 0.368)
#   v4:  timing_beta=0.1 + cosine LR peak 1e-4 → best.pt at epoch 3 during warmup,
#        P-recall collapsed to 0.296. Timing loss is lethal.
#   v5:  Same as v4, val_loss early stop → cosine LR still too disruptive (P-MAE 0.921)
#   v6:  Back to v3 + tiny timing_beta=0.01 → P-recall collapsed 0.872→0.522.
#        Even beta=0.01 is lethal.
#   v7:  v6 but timing_beta=0 → P-MAE 0.340, best single model. More epochs than v3.
#   v8:  class_weights + alpha=0.5 + cosine LR → P-MAE 0.379 (worse than v7)
#   v9:  S-balanced manifests_v3 + val_p_mae_s monitor → stopped at 13 epochs, P-MAE 0.363
#   v10: Two-stage from v9 → P-recall dropped to 0.770 (P-MAE 0.393)
#   v11: T=1.5 (sharper soft targets) → P-MAE 0.364, recall 0.810. ensemble v7+v11=0.339
#   v12: Crashed — teacher keys in checkpoint incompatible with alpha=0.0 model
#   v13: No KD + noise 40%/SNR[0,10] + gamma=0.5 + tele2x → recall 0.888 but P-MAE 0.967
#   v14: Reduced noise → P-MAE worsened to 1.039. Presence loss is culprit.
#   v15: Removed gamma, kept noise + tele2x, no KD → P-MAE 0.477. Better but not v7-level.
#   v16: Restored KD alpha=0.3 + tele2x + noise 20%/SNR[2,8] → P-MAE 0.462.
#        val_loss was similar to v7 (0.0195 vs 0.019464) but cross-domain P-MAE 36% worse.
#        CONCLUSION: noise augmentation is the primary cause of degraded timing precision,
#        not the tele2x data. Val_loss does not predict cross-domain P-MAE across
#        models with different augmentation regimes.
#
# v17 design decisions:
#   1. train_tele2x.csv with NO noise augmentation:
#      v7's main weakness is teleseismic recall (0.122 vs jma_wc's 0.238). More tele
#      training data should close this gap. Without noise, the timing precision is preserved.
#   2. alpha=0.3, T=4.0: proven best combination (v7, v3). Teacher has recall=0.881.
#      KD is the cross-domain regularizer — never remove it.
#   3. LR=5e-6: safe regime. Higher LR (1e-4 in v4/v5) destroys pretrained features.
#   4. ReduceLROnPlateau(val_loss): val_loss is a reliable cross-domain proxy.
#      Scheduling on val_p_mae_s caused premature stopping (v9: 13 epochs).
#   5. min_lr=1e-8 (vs v7's 1e-6): allows 3+ additional LR decay stages after plateau,
#      squeezing more convergence at fine-grained scales.
#   6. max_epochs=300, early_stop patience=35: v16 ran 200 epochs still improving.
#      v7 may have stopped too early (150 epoch cap). More budget + more patience.
#   7. scheduler.patience=7 (vs v7's 5): slightly more patient before LR halving,
#      avoiding aggressive decays that cut training short.
#   8. Fresh init from jma_wc pretrained (not from v7 best.pt):
#      Two-stage approach (v10) hurt recall. Fresh init with tele2x data lets the
#      model find the right basin for the new data distribution.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 300
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  timing_beta: 0.0
  presence_gamma: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_loss"
    mode: "min"
    factor: 0.5
    patience: 7
    min_lr: 1.0e-8

  early_stopping:
    monitor: "val_loss"
    patience: 35
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train_tele2x.csv"
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v17"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v17"
  metrics_csv: "results/finetune_jma_wc_global_v17_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
