# PhaseNet trained from random initialization (no SeisBench pretrained weights).
# Same layout as train_config.yaml; only model.pretrained differs.

model:
  name: "PhaseNet"
  architecture:
    in_channels: 3
    classes: 3
    phases: "PS"
    sampling_rate: 100

  pretrained:
    # Random weights — model_name / freeze_layers are ignored
    use_pretrained: false
    model_name: "stead"
    freeze_layers: []

training:
  batch_size: 128
  num_workers: 4
  # From-scratch training often needs more epochs than fine-tuning; tune as needed
  max_epochs: 150
  learning_rate: 0.001
  optimizer: "adam"
  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    monitor: "val_loss"
    patience: 15
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  dataset_name: "STEAD"
  train_data: "data/train"
  val_data: "data/val"
  test_data: "data/test"
  use_seisbench_dataset: false
  download_dataset: false

  label_error_filtering:
    enabled: true
    filter_multiplets: true
    filter_noise: true
    cache_dir: null

  augmentation:
    use_augmentation: true
    noise_addition: true
    noise_level: 0.1
    time_shift: true
    max_shift_samples: 50
    amplitude_scaling: true
    scale_range: [0.8, 1.2]

  preprocessing:
    normalize: true
    filter: true
    filter_type: "bandpass"
    freqmin: 1.0
    freqmax: 45.0

  window_length: 3001
  overlap: 0.5

logging:
  use_wandb: false
  wandb_project: "phasenet-retrain"
  wandb_entity: null
  use_tensorboard: true
  log_every_n_steps: 50
  save_dir: "results"
  checkpoint_dir: "checkpoints"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"

seed: 42
