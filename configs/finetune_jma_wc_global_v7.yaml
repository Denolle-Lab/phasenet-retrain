# v7: Same as v6 but timing_beta=0 (no timing loss)
#
#  v6 post-mortem: even timing_beta=0.01 collapsed P-recall from 0.87 (v3)
#  to 0.52, while S-MAE improved slightly. The timing loss suppresses
#  low-confidence P detections, trading recall for precision.
#  Removing it entirely to confirm timing loss is the cause.
#
#  Changes vs v6:
#   - timing_beta: 0.0 (removed)
#  Everything else matches v6 (and v3) exactly.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 150
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  timing_beta: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    monitor: "val_loss"
    patience: 20
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train.csv"
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v7"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v7"
  metrics_csv: "results/finetune_jma_wc_global_v7_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  amp: true

seed: 42
