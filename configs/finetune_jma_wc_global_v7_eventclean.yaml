# v7_eventclean: identical to v7 except train/val manifests are rebuilt
# with event-grouped splits (data/manifests_v2_eventclean/), so the same
# earthquake can't land in both train and val under different trace_names.
# See scripts/build_training_dataset.py's assign_splits() and the
# 2026-07 event-leakage audit (scripts/audit_event_leakage.py). Written to
# a separate checkpoint/run dir so the original v7 checkpoint is untouched.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 150
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 4.0

  timing_beta: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    monitor: "val_loss"
    patience: 20
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2_eventclean/train.csv"
  val_manifest:   "data/manifests_v2_eventclean/val.csv"
  test_manifest:  "data/manifests_v2_eventclean/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v7_eventclean"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v7_eventclean"
  metrics_csv: "results/finetune_jma_wc_global_v7_eventclean_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
