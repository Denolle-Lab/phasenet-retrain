# v11_clean: same recipe as v11, retrained on data/manifests_v2_clean (leak-free rebuild via issue #32-fixed build_training_dataset.py).
# Auto-generated by make_clean_config.py for the leak-free retrain comparison.

# v11: Fix probability calibration via lower distillation temperature
#
#  Calibration sweep finding (threshold sweep on step3_results.parquet):
#    jma_wc   : median P-prob=0.781, 88.1% of P picks above thr=0.3
#    v3       : median P-prob=0.713, 87.2% of P picks above thr=0.3  (gap: 0.9pp)
#    v7       : median P-prob=0.747, 85.3% of P picks above thr=0.3  (gap: 2.8pp)
#
#  Root cause: temperature=4.0 trains the student to mimic the teacher's
#  over-smoothed soft distributions (high-T KL divergence = diffuse targets).
#  The student finds the right picks but outputs lower peak probabilities,
#  so the 0.3 benchmark threshold cuts legitimate detections.
#
#  Fix: temperature 4.0 → 1.5.
#    At T=1.5 the teacher's soft targets are much sharper — the student
#    must assign high probability mass to the dominant class, producing
#    confidence scores closer to jma_wc's naturally sharp outputs.
#
#  Everything else is identical to v3 (the best stable baseline):
#    manifests_v2, alpha=0.3, AdamW 5e-6, ReduceLROnPlateau on val_p_mae_s.

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 100
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.3
    temperature: 1.5          # was 4.0 — sharper targets → higher-confidence outputs

  timing_beta: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-7

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 7
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2_clean/train.csv"
  val_manifest: "data/manifests_v2_clean/val.csv"
  test_manifest: "data/manifests_v2_clean/test.csv"
  window_length: 3001

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v11_clean"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v11_clean"
  metrics_csv: "results/finetune_jma_wc_global_v11_clean_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16-mixed"  # informational only -- finetune.py does not read this key, `amp` below is the real toggle (defaults true = fp16 autocast)
  amp: true

seed: 42
