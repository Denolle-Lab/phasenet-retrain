# v15: Remove pick-presence loss to test if gamma=0.5 caused timing collapse
#
#  v14 post-mortem:
#    Halving noise_prob (0.40→0.20) and raising SNR floor (0→5dB) did not
#    recover timing — P-MAE worsened from 0.967s (v13) to 1.039s (v14).
#    Noise is ruled out as the cause.
#
#  Hypothesis: presence_gamma=0.5 (introduced in v13) is competing with the
#    timing loss, training the model to focus on detection rather than onset
#    precision. Both v13 and v14 share gamma=0.5 and both have collapsed
#    P-MAE (~1s) and high p_outlier (~25%).
#
#  One change vs v14:
#    1. presence_gamma: 0.5 → 0.0  (presence loss removed entirely)
#
#  Everything else identical to v14 (noise_prob=0.20, SNR [5,10],
#  2x tele manifest, alpha=0, LR=5e-6, init from v7).

model:
  pretrained:
    use_pretrained: true
    model_name: "jma_wc"
    freeze_layers: []

training:
  batch_size: 1024
  num_workers: 16
  max_epochs: 60
  learning_rate: 0.000005
  optimizer: "adamw"
  weight_decay: 0.0001

  distillation:
    alpha: 0.0
    temperature: 4.0

  timing_beta: 0.0

  presence_gamma: 0.0

  scheduler:
    name: "ReduceLROnPlateau"
    monitor: "val_p_mae_s"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-7

  early_stopping:
    monitor: "val_p_mae_s"
    patience: 10
    mode: "min"

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

data:
  train_manifest: "data/manifests_v2/train_tele2x.csv"   # 2x teleseismic
  val_manifest:   "data/manifests_v2/val.csv"
  test_manifest:  "data/manifests_v2/test.csv"
  window_length: 3001

  augmentation:
    noise_prob: 0.20
    noise_snr_db_range: [5, 10]

logging:
  use_tensorboard: false
  use_wandb: false
  log_every_n_steps: 100
  save_dir: "results"
  run_name: "finetune_jma_wc_global_v15"
  checkpoint_dir: "checkpoints/finetune_jma_wc_global_v15"
  metrics_csv: "results/finetune_jma_wc_global_v15_metrics.csv"

hardware:
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  amp: true

seed: 42
